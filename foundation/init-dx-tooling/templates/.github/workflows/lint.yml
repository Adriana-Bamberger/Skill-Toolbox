name: Code Quality & Linting

on:
  push:
    branches: [main, master, develop]
  pull_request:
    branches: [main, master, develop]

permissions:
  contents: read

jobs:
  quality-assurance:
    name: Lint & Typecheck
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Check Code Formatting
        run: npm run format:check

      - name: Run Linter
        run: npm run lint

      - name: Run Typechecker
        run: |
          if [ -f tsconfig.json ]; then
            npm run typecheck
          else
            echo "Skipping typecheck: tsconfig.json not found in workspace."
          fi
